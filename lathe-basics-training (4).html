<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Training Module</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/tabler-icons/2.44.0/iconfont/tabler-icons.min.css">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{--ac:#1D9E75;--acd:#0F6E56;--acl:#E1F5EE;--g800:#2C2C2A;--g100:#EEECE8;--g50:#F7F6F3;--tm:#5F5E5A;--th:#888780;--tx:#1a1a18;--b:rgba(0,0,0,.10);--bg:#FAFAF8;--sf:#FFF;--r:10px;--rl:14px}
body{font-family:"DM Sans",sans-serif;background:var(--bg);color:var(--tx);min-height:100vh;line-height:1.6}
.pw{display:grid;grid-template-columns:260px 1fr;min-height:100vh}
.sb{background:var(--g800);color:#fff;display:flex;flex-direction:column;position:sticky;top:0;height:100vh;overflow-y:auto}
.sbb{padding:2rem 1.5rem 1.25rem;border-bottom:.5px solid rgba(255,255,255,.1)}
.bl{font-size:10px;font-weight:600;letter-spacing:.12em;text-transform:uppercase;color:rgba(255,255,255,.4);margin-bottom:6px}
.bt{font-size:18px;font-weight:600;color:#fff;line-height:1.3}
.sbn{padding:1.25rem 0;flex:1}
.nsl{font-size:10px;font-weight:600;letter-spacing:.1em;text-transform:uppercase;color:rgba(255,255,255,.25);padding:0 1.5rem;margin-bottom:6px;margin-top:1rem}
.ni{display:flex;align-items:center;gap:10px;padding:9px 1.5rem;font-size:13.5px;color:rgba(255,255,255,.55);cursor:pointer;transition:all .15s;border-left:2px solid transparent}
.ni i{font-size:16px;flex-shrink:0}.ni:hover{color:rgba(255,255,255,.85);background:rgba(255,255,255,.05)}
.ni.active{color:#fff;background:rgba(29,158,117,.2);border-left-color:var(--ac);font-weight:500}
.ni.done{color:rgba(159,225,203,1)}.ni.done .nc2{display:flex}.nc2{display:none;margin-left:auto;font-size:14px;color:var(--ac)}
.sbf{padding:1.25rem 1.5rem;border-top:.5px solid rgba(255,255,255,.1)}
.pl{font-size:11px;color:rgba(255,255,255,.4);margin-bottom:8px}
.pt{height:4px;background:rgba(255,255,255,.12);border-radius:2px;overflow:hidden}
.pf{height:100%;background:var(--ac);border-radius:2px;transition:width .4s}
.main{display:flex;flex-direction:column}
.tb{background:var(--sf);border-bottom:.5px solid var(--b);padding:1rem 2.5rem;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:10}
.tbc{font-size:13px;color:var(--th);display:flex;align-items:center;gap:6px}.tbc span{color:var(--tm)}
.tsc{font-size:13px;font-weight:500;color:var(--tm);background:var(--g100);padding:4px 12px;border-radius:20px}
.ca{padding:3rem 2.5rem;max-width:820px;flex:1}
.sl{display:none;animation:fi .25s ease}.sl.active{display:block}
@keyframes fi{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
.mtag{display:inline-flex;align-items:center;font-size:11px;font-weight:600;letter-spacing:.08em;text-transform:uppercase;color:var(--acd);background:var(--acl);padding:4px 11px;border-radius:5px;margin-bottom:14px}
h1{font-size:32px;font-weight:600;color:var(--tx);line-height:1.2;margin-bottom:12px}
.lead{font-size:16px;color:var(--tm);line-height:1.7;max-width:640px;margin-bottom:2rem}
.nv{display:flex;align-items:center;justify-content:space-between;margin-top:2rem;padding-top:1.5rem;border-top:.5px solid var(--b)}
.nb{display:inline-flex;align-items:center;gap:7px;padding:10px 20px;font-size:14px;font-family:"DM Sans",sans-serif;font-weight:500;border-radius:var(--r);cursor:pointer;transition:all .15s}
.nbg{background:transparent;border:.5px solid rgba(0,0,0,.18);color:var(--tm)}.nbg:hover{background:var(--g50)}.nbg:disabled{opacity:.35;cursor:default}
.nbp{background:var(--ac);border:none;color:#fff}.nbp:hover{background:var(--acd)}.nbp:disabled{opacity:.4;cursor:default}
@media(max-width:768px){.pw{grid-template-columns:1fr}.sb{position:static;height:auto}.ca{padding:2rem 1.25rem}h1{font-size:24px}.tb{padding:.75rem 1.25rem}}
</style>
</head>
<body>
<div class="pw">
  <aside class="sb">
    <div class="sbb">
      <div class="bl">Training</div>
      <div class="bt">Module 1</div>
    </div>
    <nav class="sbn">
      <div class="nsl">Contents</div>
      <div class="ni active" onclick="gT(0)" id="nav0"><i class="ti ti-home"></i> Welcome <span class="nc2"><i class="ti ti-check"></i></span></div>
      <div class="ni" onclick="gT(1)" id="nav1"><i class="ti ti-award"></i> Complete <span class="nc2"><i class="ti ti-check"></i></span></div>
    </nav>
    <div class="sbf">
      <div class="pl" id="pLbl">0% complete</div>
      <div class="pt"><div class="pf" id="pFil" style="width:0%"></div></div>
    </div>
  </aside>
  <div class="main">
    <div class="tb">
      <div class="tbc">Training <i class="ti ti-chevron-right" style="font-size:12px"></i><span>Module 1</span></div>
      <div class="tsc" id="sCnt">1 of 2</div>
    </div>
    <div class="ca">

      <div class="sl active" id="s0">
        <div class="mtag">Module 1</div>
        <h1>Welcome</h1>
        <p class="lead">Use the admin panel to build your training content. Add slides, images, quizzes, and more — then click Publish Live to update this page.</p>
        <div class="nv">
          <button class="nb nbg" disabled><i class="ti ti-arrow-left"></i> Previous</button>
          <button class="nb nbp" onclick="cS(1)">Next <i class="ti ti-arrow-right"></i></button>
        </div>
      </div>

      <div class="sl" id="s1">
        <div style="text-align:center;padding:3rem 1rem">
          <div style="font-size:56px;color:var(--ac);margin-bottom:1.25rem"><i class="ti ti-award"></i></div>
          <h1 style="margin-bottom:10px">Module Complete!</h1>
          <p style="font-size:15px;color:var(--tm);margin-bottom:2rem">You have completed this module.</p>
        </div>
        <div class="nv">
          <button class="nb nbg" onclick="cS(-1)"><i class="ti ti-arrow-left"></i> Previous</button>
          <button class="nb nbp" disabled style="opacity:.3">All done <i class="ti ti-check"></i></button>
        </div>
      </div>

    </div>
  </div>
</div>
<script>
const T=2;let cur=0,vis=new Set([0]);
function uUI(){for(let i=0;i<T;i++){const n=document.getElementById('nav'+i);n.classList.remove('active','done');if(i===cur)n.classList.add('active');else if(vis.has(i))n.classList.add('done')}const p=Math.round(vis.size/T*100);document.getElementById('pFil').style.width=p+'%';document.getElementById('pLbl').textContent=p+'% complete';document.getElementById('sCnt').textContent=(cur+1)+' of '+T}
function gT(i){document.getElementById('s'+cur).classList.remove('active');cur=i;vis.add(i);document.getElementById('s'+cur).classList.add('active');window.scrollTo({top:0,behavior:'smooth'});uUI()}
function cS(d){const n=cur+d;if(n<0||n>=T)return;gT(n)}
uUI();
</script>
</body>
</html>
